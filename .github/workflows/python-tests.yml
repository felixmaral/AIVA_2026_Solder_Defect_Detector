name: Python Unit Tests CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install system dependencies
      # Requerido para el correcto funcionamiento de opencv-python en Ubuntu (headless)
      run: sudo apt-get update && sudo apt-get install -y libgl1

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements_dev.txt

    - name: Execute tests
      # Se inyecta la variable PYTHONPATH para emular el comportamiento del archivo .env local
      env:
        PYTHONPATH: ${{ github.workspace }}
      run: |
        # Ejecutar explícitamente los test del código principal, omitiendo la carpeta _mockup/
        python -m unittest -v tests.test_vision tests.test_hardware tests.test_pcb_image tests.test_solder_defect tests.test_detection_result tests.test_main_integration